version: "3.9"

services:
  django:
    build: .
    image: headroom-django:latest
    container_name: headroom-django
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --reload

  celery-worker:
    build: .
    image: headroom-django:latest
    container_name: headroom-celery-worker
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: celery -A celery_app worker --loglevel=info -Q headroom-default -c 4

  celery-beat:
    build: .
    image: headroom-django:latest
    container_name: headroom-celery-beat
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      - postgres
      - redis
      - django
    volumes:
      - .:/app
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  postgres:
    image: postgres:16
    container_name: headroom-postgres
    environment:
      POSTGRES_DB: headroom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: headroom-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
